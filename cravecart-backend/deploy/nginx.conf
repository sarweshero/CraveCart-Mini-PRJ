# CraveCart Nginx Config
# Location: /etc/nginx/sites-available/cravecart
# After Certbot runs SSL is added automatically

upstream django {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name api.sarweshero.me;

    # Let Certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /home/ubuntu/Projects/CraveCart-Mini-PRJ/cravecart-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;
        proxy_connect_timeout 30s;
        proxy_read_timeout    30s;
    }
}
