# ══════════════════════════════════════════════════════════════════════════════
#  CraveCart — Nginx Configuration
#  Location on server: /etc/nginx/sites-available/cravecart
#  Enable with: sudo ln -s /etc/nginx/sites-available/cravecart \
#                          /etc/nginx/sites-enabled/cravecart
#
#  SSL certificates managed by Certbot (Let's Encrypt):
#    sudo certbot --nginx -d api.sarweshero.me
#
#  Replace api.sarweshero.me with your actual domain throughout this file.
# ══════════════════════════════════════════════════════════════════════════════

# Rate limiting zones (defined in http context, applied per location)
limit_req_zone  $binary_remote_addr  zone=api_limit:10m   rate=30r/m;
limit_req_zone  $binary_remote_addr  zone=auth_limit:10m  rate=5r/m;
limit_conn_zone $binary_remote_addr  zone=conn_limit:10m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.sarweshero.me;

    # Let's Encrypt ACME challenge (Certbot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2  on;

    server_name api.sarweshero.me;

    # ── SSL (Certbot fills these in) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.sarweshero.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sarweshero.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers (complement Django's) ────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                         always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block"                always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/cravecart-access.log  combined;
    error_log  /var/log/nginx/cravecart-error.log   warn;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 20m;      # max upload size (profile images etc.)
    limit_conn conn_limit 20;      # max 20 concurrent connections per IP

    # ── Static files — served directly by Nginx (faster than Django) ─────────
    location /static/ {
        alias /home/ubuntu/cravecart-backend/staticfiles/;
        expires     30d;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        gzip_static on;
    }

    # ── Health check — no rate limit, no logging ──────────────────────────────
    location /health/ {
        proxy_pass         http://gunicorn;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Auth endpoints — stricter rate limit ──────────────────────────────────
    location ~ ^/api/auth/(login|register)/ {
        limit_req   zone=auth_limit burst=10 nodelay;
        proxy_pass  http://gunicorn;
        include     /etc/nginx/proxy_params;
    }

    # ── All other API traffic ─────────────────────────────────────────────────
    location / {
        limit_req  zone=api_limit burst=60 nodelay;
        proxy_pass http://gunicorn;
        include    /etc/nginx/proxy_params;
    }
}

# ── Upstream — Gunicorn via Unix socket ───────────────────────────────────────
upstream gunicorn {
    # Unix socket — set by gunicorn.conf.py: bind = "unix:/run/gunicorn/cravecart.sock"
    server  unix:/run/gunicorn/cravecart.sock  fail_timeout=0;
}
