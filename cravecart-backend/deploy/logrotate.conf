# Location on server: /etc/logrotate.d/cravecart
# Rotates Celery worker and beat logs daily, keeping 14 days

/var/log/cravecart/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 ubuntu ubuntu
    sharedscripts
    postrotate
        systemctl reload cravecart-celery-worker > /dev/null 2>&1 || true
        systemctl reload cravecart-celery-beat   > /dev/null 2>&1 || true
    endscript
}
