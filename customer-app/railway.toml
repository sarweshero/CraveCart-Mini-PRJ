[build]
builder      = "nixpacks"
buildCommand = "npm install --frozen-lockfile && npm run build"

[deploy]
startCommand  = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType  = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.environmentVariables]]
name  = "NODE_ENV"
value = "production"
